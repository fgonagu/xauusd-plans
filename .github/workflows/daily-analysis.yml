name: 🤖 Análisis Diario XAUUSD

on:
  schedule:
    - cron: '*/30 * * * *'   # Se ejecuta CADA 30 MINUTOS (para pruebas)
  workflow_dispatch:
  push:
    branches:
      - main   # Esto hará que se ejecute con cada push (temporal)

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: |
          pip install requests google-genai
      
      - name: 🔍 Ejecutar análisis de XAUUSD
        run: python scripts/generate_plan.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      
      - name: 📤 Subir cambios a GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "bot@github.com"
          git add gold_plan.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Actualización diaria XAUUSD $(date '+%Y-%m-%d')"
          git push
